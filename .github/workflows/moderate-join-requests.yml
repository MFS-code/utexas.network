name: Moderate Join Requests

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  moderate:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Check command and permissions
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.comment.body || '').trim().toLowerCase();
            const association = context.payload.comment.author_association;
            const hasJoinLabel = (context.payload.issue.labels || []).some(l => l.name === 'join-request');
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(association);

            if (!hasJoinLabel || !allowed || (body !== '/approve' && body !== '/reject')) {
              core.setOutput('run', 'false');
              return;
            }

            core.setOutput('run', 'true');
            core.setOutput('command', body);
            core.setOutput('issue_number', String(context.payload.issue.number));

      - name: Checkout repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Approve request and commit member
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.command == '/approve'
        id: approve_commit
        continue-on-error: true
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node scripts/apply-approved-request.mjs
          if git diff --quiet; then
            echo "No file changes were generated."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/members.ts
            git commit -m "approve join request #${{ steps.gate.outputs.issue_number }}"
            git push
          fi

      - name: Send approval email to applicant
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.command == '/approve' && steps.approve_commit.outcome == 'success'
        id: approval_email
        continue-on-error: true
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          node scripts/send-approval-email.mjs

      - name: Mark approved and close issue
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.command == '/approve' && steps.approve_commit.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = Number('${{ steps.gate.outputs.issue_number }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['approved']
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              name: 'pending'
            }).catch(() => {});
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: `Approved and committed to \`src/data/members.ts\`.

Approval email status: ${
  '${{ steps.approval_email.outcome }}' === 'success'
    ? 'sent to applicant.'
    : 'failed to send (check workflow logs).'
}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              state: 'closed'
            });

      - name: Mark approval failed
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.command == '/approve' && steps.approve_commit.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = Number('${{ steps.gate.outputs.issue_number }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['needs-attention']
            }).catch(() => {});
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: 'Approval command failed before committing `src/data/members.ts`. This usually means the generated member id already exists or the payload was invalid. Check workflow logs and re-approve after fixing.'
            });

      - name: Mark rejected and close issue
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.command == '/reject'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = Number('${{ steps.gate.outputs.issue_number }}');
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['rejected']
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              name: 'pending'
            }).catch(() => {});
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: 'Rejected. No changes were committed.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              state: 'closed'
            });
